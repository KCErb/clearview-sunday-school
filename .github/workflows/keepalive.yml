name: Supabase keep-alive

# Free-tier Supabase projects pause after 7 days with no database requests.
# A weekly read keeps ours awake. Runs Mondays; also runnable on demand.
on:
  schedule:
    - cron: '17 14 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -fsS -o /dev/null -w '%{http_code}' \
            "${{ secrets.SUPABASE_URL }}/rest/v1/schedule?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded: $code"
