name: Supabase keep-alive

# Free-tier Supabase projects pause after 7 days with no database requests.
# A weekly read keeps ours awake. Runs Mondays; also runnable on demand.
on:
  schedule:
    - cron: '17 14 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS --fail-with-body -o /tmp/supabase-keepalive.out -w '%{http_code}' \
            "${{ secrets.SUPABASE_URL }}/rest/v1/shared_inquiries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}") || {
              cat /tmp/supabase-keepalive.out
              exit 1
            }
          echo "Supabase responded: $code"
